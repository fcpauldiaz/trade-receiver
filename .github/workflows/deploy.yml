name: Deploy

on:
  push:
    tags:
      - "v*"

jobs:
  deploy-receiver:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build Docker image
        run: docker build -t trade-receiver:${{ github.ref_name }} .
      - name: Deploy placeholder
        run: |
          echo "Push trade-receiver:${{ github.ref_name }} to your registry and deploy."
          echo "Set ENVIRONMENT=production and required secrets before running."

  deploy-platform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: npm install
      - run: npm run build
      - name: Deploy placeholder
        run: echo "Upload dist/ to your static host (Vercel, Cloudflare Pages, etc.)."
