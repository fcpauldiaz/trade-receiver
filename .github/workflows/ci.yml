name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: mkdir -p data
      - run: rm -f data/test.db
      - run: DATABASE_URL=sqlite:///./data/test.db alembic upgrade head
      - run: DATABASE_URL=sqlite:///./data/test.db pytest
