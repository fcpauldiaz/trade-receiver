# Coolify uses Nixpacks by default. Do not override [phases.install] with bare `pip` —
# the venv is at /opt/venv and PATH is not set until after the default setup phase.
# Default install handles pyproject.toml + requirements.txt.

[start]
cmd = "/opt/venv/bin/python -m uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}"
